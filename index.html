<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Padel Random Pro - Agenda</title>

<link rel="manifest" href="/padel-random-pro/manifest.json">
<meta name="theme-color" content="#1e3c72">

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  color:white;
  text-align:center;
  padding:20px;
}

.card{
  background:white;
  color:#333;
  border-radius:18px;
  padding:18px;
  margin:15px auto;
  max-width:600px;
  box-shadow:0 8px 20px rgba(0,0,0,0.35);
}

input{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

.agenda-grid{
  display:grid;
  grid-template-columns:80px 1fr 1fr;
  gap:6px;
  margin-top:15px;
}

.hora{
  font-weight:bold;
  align-self:center;
}

.slot{
  padding:12px;
  border-radius:10px;
  cursor:pointer;
  font-size:14px;
  transition:0.2s;
}

.libre{
  background:#00c853;
  color:white;
}

.libre:hover{
  transform:scale(1.05);
}

.ocupado{
  background:#ff5252;
  color:white;
  cursor:not-allowed;
}
</style>
</head>

<body>

<h1>🎾 Padel Random Pro</h1>

<div class="card">
  <h3>📅 Agenda de Reservas</h3>
  <input type="date" id="fechaAgenda">
  <div id="agenda"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBYCPUSGq_uCutc3D10vSRCOtZRJZKr0fE",
  authDomain: "turnos-padel-3f40e.firebaseapp.com",
  databaseURL: "https://turnos-padel-3f40e-default-rtdb.firebaseio.com",
  projectId: "turnos-padel-3f40e",
  storageBucket: "turnos-padel-3f40e.firebasestorage.app",
  messagingSenderId: "863154513883",
  appId: "1:863154513883:web:a20fb9cf3307048a54e9fe"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const fechaAgendaInput = document.getElementById("fechaAgenda");
const agendaDiv = document.getElementById("agenda");

const hoy = new Date();
fechaAgendaInput.value = hoy.toISOString().split("T")[0];

fechaAgendaInput.addEventListener("change", cargarAgenda);

function generarHoras(){
  const horas=[];
  for(let h=9;h<23;h++){
    horas.push(`${String(h).padStart(2,"0")}:00`);
    horas.push(`${String(h).padStart(2,"0")}:30`);
  }
  return horas;
}

function cargarAgenda(){
  const fecha = fechaAgendaInput.value;
  agendaDiv.innerHTML="";
  const grid = document.createElement("div");
  grid.className="agenda-grid";
  agendaDiv.appendChild(grid);

  const horas = generarHoras();

  grid.innerHTML += "<div></div><div><b>Cancha 1</b></div><div><b>Cancha 2</b></div>";

  const agendaRef = ref(db,"agenda/"+fecha);

  onValue(agendaRef,(snapshot)=>{
    const data = snapshot.val()||{};
    grid.innerHTML = "<div></div><div><b>Cancha 1</b></div><div><b>Cancha 2</b></div>";

    horas.forEach(hora=>{
      grid.innerHTML+=`<div class="hora">${hora}</div>`;

      for(let c=1;c<=2;c++){
        const ocupado = data[hora]?.["cancha"+c];
        const div = document.createElement("div");

        if(ocupado){
          div.className="slot ocupado";
          div.textContent=ocupado.nombre;
        }else{
          div.className="slot libre";
          div.textContent="Libre";
          div.onclick=()=>reservar(fecha,hora,c);
        }

        grid.appendChild(div);
      }
    });

  });
}

async function reservar(fecha,hora,cancha){
  const nombre = prompt("Tu nombre:");
  if(!nombre) return;

  await set(ref(db,`agenda/${fecha}/${hora}/cancha${cancha}`),{
    nombre
  });
}

cargarAgenda();

</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/padel-random-pro/sw.js');
}
</script>

</body>
</html>
