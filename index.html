<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Padel Random Pro</title>

<link rel="manifest" href="/padel-random-pro/manifest.json">
<meta name="theme-color" content="#1e3c72">

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  color:white;
  text-align:center;
  padding:20px;
}

.card{
  background:white;
  color:#333;
  border-radius:18px;
  padding:18px;
  margin:15px auto;
  max-width:420px;
  box-shadow:0 8px 20px rgba(0,0,0,0.35);
}

input,select{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

button{
  background:#00c853;
  border:none;
  color:white;
  padding:12px;
  border-radius:14px;
  margin-top:10px;
  width:100%;
  cursor:pointer;
}

.admin{ background:#ff5252; }

.item{
  background:white;
  color:#1e3c72;
  margin:8px auto;
  padding:12px;
  border-radius:14px;
  font-weight:bold;
  max-width:420px;
}

.waiting{ background:#ffe082; color:#333; }
.section-title{ font-weight:bold; margin-top:20px; }
</style>
</head>

<body>

<h1>🎾 Padel Random Pro</h1>

<div id="adminPanel" style="display:none;" class="card">
  <h3>👑 Crear Turno</h3>
  <input type="date" id="fecha">
  <input type="time" id="inicio">
  <input type="time" id="fin">
  <button class="admin" id="crearTurno">Crear Turno</button>
</div>

<div class="card">
  <h3>Turnos disponibles</h3>
  <div id="listaTurnos"></div>
</div>

<div id="panelJugador" style="display:none;" class="card">
  <h3>Anotarse</h3>
  <input id="nombre" placeholder="Tu nombre">
  <select id="tipo">
    <option>Drive</option>
    <option>Revés</option>
  </select>
  <button id="anotarse">Anotarme</button>
</div>

<div id="panelAdminTurno" style="display:none;" class="card">
  <h3>Admin Turno</h3>
  <input type="number" id="canchas" placeholder="Cantidad de canchas" min="1">
  <button class="admin" id="sortear">Sortear</button>
  <button class="admin" id="cerrarTurno">Cerrar Turno</button>
</div>

<div id="listaJugadores"></div>
<div id="resultado"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, remove, update } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBYCPUSGq_uCutc3D10vSRCOtZRJZKr0fE",
  authDomain: "turnos-padel-3f40e.firebaseapp.com",
  databaseURL: "https://turnos-padel-3f40e-default-rtdb.firebaseio.com",
  projectId: "turnos-padel-3f40e",
  storageBucket: "turnos-padel-3f40e.firebasestorage.app",
  messagingSenderId: "863154513883",
  appId: "1:863154513883:web:a20fb9cf3307048a54e9fe"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const isAdmin = window.location.search.includes("admin=1234");

if(isAdmin){
  document.getElementById("adminPanel").style.display="block";
}

let turnoSeleccionado = null;

function mezclar(lista){
  for(let i=lista.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [lista[i],lista[j]]=[lista[j],lista[i]];
  }
  return lista;
}

// LISTAR TURNOS
onValue(ref(db,"turnos"), snapshot=>{
  const data=snapshot.val()||{};
  const listaDiv=document.getElementById("listaTurnos");
  listaDiv.innerHTML="";
  Object.entries(data).forEach(([id,t])=>{
    if(t.estado==="abierto"){
      const btn=document.createElement("button");
      btn.textContent=`${t.fecha} ${t.inicio}-${t.fin}`;
      btn.onclick=()=>seleccionarTurno(id);
      listaDiv.appendChild(btn);
    }
  });
});

// CREAR TURNO (ADMIN)
document.getElementById("crearTurno").onclick=()=>{
  const fecha = document.getElementById("fecha").value;
  const horaInicio = document.getElementById("horaInicio").value;
  const horaFin = document.getElementById("horaFin").value;

  if (!fecha || !horaInicio || !horaFin) {
    alert("Completá todos los campos");
    return;
  }

  // Fecha y hora seleccionadas
  const inicioSeleccionado = new Date(`${fecha}T${horaInicio}:00`);
  const finSeleccionado = new Date(`${fecha}T${horaFin}:00`);

  // Hora mínima permitida (próxima hora exacta)
  const ahora = new Date();
  const proximaHora = new Date(ahora);
  proximaHora.setMinutes(0, 0, 0);
  proximaHora.setHours(proximaHora.getHours() + 1);

  if (inicioSeleccionado < proximaHora) {
    alert("Solo se pueden crear turnos desde la próxima hora en adelante.");
    return;
  }

  if (finSeleccionado <= inicioSeleccionado) {
    alert("La hora de fin debe ser posterior a la de inicio.");
    return;
  }

  const duracionMinutos = (finSeleccionado - inicioSeleccionado) / 60000;

  if (duracionMinutos < 90) {
    alert("El turno debe durar mínimo 1 hora y media.");
    return;
  }

  if (duracionMinutos % 30 !== 0) {
    alert("La duración debe ser en múltiplos de 30 minutos.");
    return;
  }

  // Guardar en Firebase
  const nuevoTurno = {
    fecha: fecha,
    inicio: horaInicio,
    fin: horaFin,
    estado: "abierto"
  };

  firebase.database().ref("turnos").push(nuevoTurno);

  alert("Turno creado correctamente");

  document.getElementById("fecha").value = "";
  document.getElementById("horaInicio").value = "";
  document.getElementById("horaFin").value = "";
}
};

// SELECCIONAR TURNO
function seleccionarTurno(id){
  turnoSeleccionado=id;
  document.getElementById("panelJugador").style.display="block";
  if(isAdmin){
    document.getElementById("panelAdminTurno").style.display="block";
  }

  onValue(ref(db,"turnos/"+id+"/jugadores"), snapshot=>{
    const data=snapshot.val()||{};
    const lista=document.getElementById("listaJugadores");
    lista.innerHTML="<div class='section-title'>👥 Inscriptos</div>";
    Object.values(data).forEach(j=>{
      lista.innerHTML+=`<div class="item">${j.nombre} - ${j.tipo}</div>`;
    });
  });
}

// ANOTARSE
document.getElementById("anotarse").onclick=()=>{
  if(!turnoSeleccionado) return alert("Elegí un turno");
  const nombre=document.getElementById("nombre").value.trim();
  const tipo=document.getElementById("tipo").value;
  if(!nombre) return alert("Ingresá nombre");

  push(ref(db,"turnos/"+turnoSeleccionado+"/jugadores"),{
    nombre,tipo
  });

  document.getElementById("nombre").value="";
};

// SORTEAR
document.getElementById("sortear").onclick=()=>{
  const canchas=parseInt(document.getElementById("canchas").value);
  if(!canchas||canchas<1) return alert("Ingresá canchas");

  onValue(ref(db,"turnos/"+turnoSeleccionado+"/jugadores"), snapshot=>{
    const jugadores=Object.values(snapshot.val()||{});
    const drives=mezclar(jugadores.filter(j=>j.tipo==="Drive"));
    const reves=mezclar(jugadores.filter(j=>j.tipo==="Revés"));

    if(drives.length!==reves.length){
      alert("Drive y Revés deben ser iguales");
      return;
    }

    let parejas=[];
    for(let i=0;i<drives.length;i++){
      parejas.push(drives[i].nombre+" + "+reves[i].nombre);
    }

    const partidos=Math.min(Math.floor(parejas.length/2),canchas);
    const resultado=document.getElementById("resultado");
    resultado.innerHTML="<div class='section-title'>🏆 Partidos</div>";

    for(let i=0;i<partidos;i++){
      resultado.innerHTML+=`<div class="item">Cancha ${i+1}: ${parejas[i*2]} vs ${parejas[i*2+1]}</div>`;
    }

    if(parejas.length>partidos*2){
      resultado.innerHTML+="<div class='section-title'>⏳ Espera</div>";
      for(let i=partidos*2;i<parejas.length;i++){
        resultado.innerHTML+=`<div class="item waiting">${parejas[i]}</div>`;
      }
    }

  },{onlyOnce:true});
};

// CERRAR TURNO
document.getElementById("cerrarTurno").onclick=()=>{
  update(ref(db,"turnos/"+turnoSeleccionado),{
    estado:"cerrado"
  });
  alert("Turno cerrado");
};

</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/padel-random-pro/sw.js');
}
</script>

</body>
</html>
