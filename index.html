<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Padel Random Pro</title>

<link rel="manifest" href="/padel-random-pro/manifest.json">
<meta name="theme-color" content="#1e3c72">

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  color:white;
  text-align:center;
  padding:20px;
}
.card{
  background:white;
  color:#333;
  border-radius:18px;
  padding:18px;
  margin:15px auto;
  max-width:700px;
  box-shadow:0 8px 20px rgba(0,0,0,0.35);
}
input{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  border:1px solid #ccc;
}
.agenda-grid{
  display:grid;
  grid-template-columns:80px 1fr 1fr;
  gap:6px;
  margin-top:15px;
}
.hora{ font-weight:bold; align-self:center; }
.slot{
  padding:12px;
  border-radius:10px;
  cursor:pointer;
  font-size:14px;
  transition:0.2s;
}
.libre{ background:#00c853; color:white; }
.libre:hover{ transform:scale(1.05); }
.ocupado{ background:#ff5252; color:white; cursor:not-allowed; }
.pasado{ background:#999; color:white; cursor:not-allowed; }
</style>
</head>

<body>

<h1>🎾 Padel Random Pro</h1>

<div class="card">
  <h3>📅 Agenda</h3>
  <input type="date" id="fechaAgenda">
  <div id="agenda"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, set }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = { apiKey: "AIzaSyBYCPUSGq_uCutc3D10vSRCOtZRJZKr0fE", 
                        authDomain: "turnos-padel-3f40e.firebaseapp.com", 
                        databaseURL: "https://turnos-padel-3f40e-default-rtdb.firebaseio.com", 
                        projectId: "turnos-padel-3f40e", 
                        storageBucket: "turnos-padel-3f40e.firebasestorage.app", 
                        messagingSenderId: "863154513883", 
                        appId: "1:863154513883:web:a20fb9cf3307048a54e9fe" };

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const fechaInput=document.getElementById("fechaAgenda");
const agendaDiv=document.getElementById("agenda");

fechaInput.value=new Date().toISOString().split("T")[0];
fechaInput.addEventListener("change",cargarAgenda);

function generarHoras(){
  const horas=[];
  for(let h=9;h<23;h++){
    horas.push(`${String(h).padStart(2,"0")}:00`);
    horas.push(`${String(h).padStart(2,"0")}:30`);
  }
  return horas;
}

function horaEsPasada(fecha,hora){
  const ahora=new Date();
  const bloque=new Date(`${fecha}T${hora}:00`);
  return bloque<ahora;
}

async function cargarAgenda(){

  const fecha=fechaInput.value;
  agendaDiv.innerHTML="";
  const grid=document.createElement("div");
  grid.className="agenda-grid";
  agendaDiv.appendChild(grid);

  const horas=generarHoras();
  grid.innerHTML="<div></div><div><b>Cancha 1</b></div><div><b>Cancha 2</b></div>";

  const snapshot=await get(ref(db,"agenda/"+fecha));
  const data=snapshot.val()||{};

  horas.forEach(hora=>{
    const horaDiv=document.createElement("div");
    horaDiv.className="hora";
    horaDiv.textContent=hora;
    grid.appendChild(horaDiv);

    for(let c=1;c<=2;c++){

      const div=document.createElement("div");
      const ocupado=data[hora]?.["cancha"+c];

      if(horaEsPasada(fecha,hora)){
        div.className="slot pasado";
        div.textContent="Pasado";
      }
      else if(ocupado){
        div.className="slot ocupado";
        div.textContent=ocupado.nombre;
      }
      else{
        div.className="slot libre";
        div.textContent="Libre";
        div.addEventListener("click",()=>reservar(fecha,hora,c));
      }

      grid.appendChild(div);
    }
  });
}

async function reservar(fecha,hora,cancha){

  const nombre=prompt("Tu nombre:");
  if(!nombre) return;

  const duracion=prompt("Duración (90 o 120 minutos):");
  if(duracion!="90" && duracion!="120"){
    alert("Solo 90 o 120");
    return;
  }

  const bloquesNecesarios=duracion=="90"?3:4;
  const horas=generarHoras();
  const index=horas.indexOf(hora);

  if(index+bloquesNecesarios>horas.length){
    alert("No alcanza el horario hasta las 23hs");
    return;
  }

  const snapshot=await get(ref(db,"agenda/"+fecha));
  const dataActual=snapshot.val()||{};

  for(let i=0;i<bloquesNecesarios;i++){
    const h=horas[index+i];
    if(dataActual[h]?.["cancha"+cancha]){
      alert("Se superpone con otra reserva");
      return;
    }
  }

  for(let i=0;i<bloquesNecesarios;i++){
    const h=horas[index+i];
    await set(ref(db,`agenda/${fecha}/${h}/cancha${cancha}`),{
      nombre
    });
  }

  alert("Reserva confirmada ✅");
  cargarAgenda();
}

cargarAgenda();

</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/padel-random-pro/sw.js');
}
</script>

</body>
</html>
