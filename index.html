<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Padel Random Pro</title>

<link rel="manifest" href="/padel-random-pro/manifest.json">
<meta name="theme-color" content="#1e3c72">

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  color:white;
  text-align:center;
  padding:20px;
}
.card{
  background:white;
  color:#333;
  border-radius:18px;
  padding:18px;
  margin:15px auto;
  max-width:420px;
  box-shadow:0 8px 20px rgba(0,0,0,0.35);
}
input,select{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  border:1px solid #ccc;
  box-sizing:border-box;
}
button{
  background:#00c853;
  border:none;
  color:white;
  padding:12px;
  border-radius:14px;
  margin-top:10px;
  width:100%;
  cursor:pointer;
}
.admin{ background:#ff5252; }
.item{
  background:white;
  color:#1e3c72;
  margin:8px auto;
  padding:12px;
  border-radius:14px;
  font-weight:bold;
  max-width:420px;
}
.waiting{ background:#ffe082; color:#333; }
.section-title{ font-weight:bold; margin-top:20px; }
</style>
</head>

<body>

<h1>🎾 Padel Random Pro</h1>

<div id="adminPanel" style="display:none;" class="card">
  <h3>👑 Crear Turno</h3>
  <input type="date" id="fecha">
  <input type="time" id="inicio" step="1800">
  <input type="time" id="fin" step="1800">
  <button class="admin" id="crearTurno">Crear Turno</button>
</div>

<div class="card">
  <h3>Turnos disponibles</h3>
  <div id="listaTurnos"></div>
</div>

<div id="panelJugador" style="display:none;" class="card">
  <h3>Anotarse</h3>
  <input id="nombre" placeholder="Tu nombre">
  <select id="tipo">
    <option>Drive</option>
    <option>Revés</option>
  </select>
  <button id="anotarse">Anotarme</button>
</div>

<div id="panelAdminTurno" style="display:none;" class="card">
  <h3>Admin Turno</h3>
  <input type="number" id="canchas" placeholder="Cantidad de canchas" min="1">
  <button class="admin" id="sortear">Sortear</button>
  <button class="admin" id="cerrarTurno">Cerrar Turno</button>
</div>

<div id="listaJugadores"></div>
<div id="resultado"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, update }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "turnos-padel-3f40e.firebaseapp.com",
  databaseURL: "https://turnos-padel-3f40e-default-rtdb.firebaseio.com",
  projectId: "turnos-padel-3f40e",
  storageBucket: "turnos-padel-3f40e.firebasestorage.app",
  messagingSenderId: "863154513883",
  appId: "1:863154513883:web:a20fb9cf3307048a54e9fe"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const isAdmin = window.location.search.includes("admin=1234");
if(isAdmin) document.getElementById("adminPanel").style.display="block";

let turnoSeleccionado=null;

// 🔥 CONFIG PREMIUM HORARIO
const ahora=new Date();
const proximaHora=new Date(ahora);
proximaHora.setMinutes(0,0,0);
proximaHora.setHours(proximaHora.getHours()+1);

document.getElementById("fecha").min=proximaHora.toISOString().split("T")[0];
document.getElementById("inicio").min=proximaHora.toTimeString().slice(0,5);

// CREAR TURNO
document.getElementById("crearTurno").onclick=()=>{
  const fecha=document.getElementById("fecha").value;
  const inicio=document.getElementById("inicio").value;
  const fin=document.getElementById("fin").value;

  if(!fecha||!inicio||!fin) return alert("Completá todo");

  const ini=new Date(`${fecha}T${inicio}:00`);
  const f=new Date(`${fecha}T${fin}:00`);

  if(ini<proximaHora) return alert("Debe ser desde próxima hora");

  const dur=(f-ini)/60000;

  if(dur<90) return alert("Mínimo 1h30");
  if(dur%30!==0) return alert("Solo múltiplos de 30 min");

  push(ref(db,"turnos"),{
    fecha,
    inicio,
    fin,
    estado:"abierto"
  });

  alert("Turno creado ✔");
};

// LISTAR TURNOS + cierre automático
onValue(ref(db,"turnos"),snapshot=>{
  const data=snapshot.val()||{};
  const lista=document.getElementById("listaTurnos");
  lista.innerHTML="";

  Object.entries(data).forEach(([id,t])=>{
    const inicioTurno=new Date(`${t.fecha}T${t.inicio}:00`);
    if(new Date()>inicioTurno && t.estado==="abierto"){
      update(ref(db,"turnos/"+id),{estado:"cerrado"});
      return;
    }

    if(t.estado==="abierto"){
      const btn=document.createElement("button");
      btn.textContent=`${t.fecha} ${t.inicio}-${t.fin}`;
      btn.onclick=()=>seleccionarTurno(id);
      lista.appendChild(btn);
    }
  });
});

function seleccionarTurno(id){
  turnoSeleccionado=id;
  document.getElementById("panelJugador").style.display="block";
  if(isAdmin) document.getElementById("panelAdminTurno").style.display="block";

  onValue(ref(db,"turnos/"+id+"/jugadores"),snapshot=>{
    const data=snapshot.val()||{};
    const lista=document.getElementById("listaJugadores");
    lista.innerHTML="<div class='section-title'>👥 Inscriptos</div>";
    Object.values(data).forEach(j=>{
      lista.innerHTML+=`<div class="item">${j.nombre} - ${j.tipo}</div>`;
    });
  });
}

document.getElementById("anotarse").onclick=()=>{
  if(!turnoSeleccionado) return alert("Elegí turno");
  const nombre=document.getElementById("nombre").value.trim();
  const tipo=document.getElementById("tipo").value;
  if(!nombre) return alert("Nombre vacío");

  push(ref(db,"turnos/"+turnoSeleccionado+"/jugadores"),{nombre,tipo});
  document.getElementById("nombre").value="";
};

</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/padel-random-pro/sw.js');
}
</script>

</body>
</html>
