<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Padel Random Pro</title>

  <link rel="manifest" href="/padel-random-pro/manifest.json">
  <meta name="theme-color" content="#1e3c72">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 { font-size: 28px; margin-bottom: 5px; }
    .sub { opacity: 0.8; margin-bottom: 20px; font-size: 14px; }

    .card {
      background: white;
      color: #333;
      border-radius: 18px;
      padding: 18px;
      margin: 15px auto;
      max-width: 420px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.35);
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 10px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    .btn {
      background: #00c853;
      border: none;
      color: white;
      font-size: 16px;
      padding: 12px;
      border-radius: 14px;
      cursor: pointer;
      margin-top: 12px;
      width: 100%;
      max-width: 420px;
    }

    .section-title {
      margin-top: 25px;
      font-size: 20px;
      font-weight: bold;
    }

    .item {
      background: white;
      color: #1e3c72;
      margin: 8px auto;
      padding: 12px;
      border-radius: 14px;
      font-weight: bold;
      max-width: 420px;
    }

    .waiting { background: #ffe082; color: #333; }
    .admin { background: #ff5252; }
  </style>
</head>

<body>

<h1>🎾 Padel Random Pro</h1>
<div class="sub">Turnos en tiempo real</div>

<div class="card">
  <h3>Nombre del turno</h3>
  <input id="turno" placeholder="Ej: martes-21hs">
  <button class="btn" id="conectar">Conectar</button>
</div>

<div class="card">
  <h3>Anotarse</h3>
  <input id="nombre" placeholder="Tu nombre">
  <select id="tipo">
    <option>Drive</option>
    <option>Revés</option>
  </select>
  <button class="btn" id="anotarse">Anotarme</button>
</div>

<div class="card">
  <h3>Canchas</h3>
  <input type="number" id="canchas" placeholder="Ej: 2" min="1">
  <button class="btn admin" id="sortear">🎲 Sortear (Admin)</button>
  <button class="btn admin" id="limpiar">🗑 Limpiar turno</button>
</div>

<div id="lista"></div>
<div id="resultado"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBYCPUSGq_uCutc3D10vSRCOtZRJZKr0fE",
  authDomain: "turnos-padel-3f40e.firebaseapp.com",
  databaseURL: "https://turnos-padel-3f40e-default-rtdb.firebaseio.com",
  projectId: "turnos-padel-3f40e",
  storageBucket: "turnos-padel-3f40e.firebasestorage.app",
  messagingSenderId: "863154513883",
  appId: "1:863154513883:web:a20fb9cf3307048a54e9fe"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let turnoActual = "";

const listaDiv = document.getElementById("lista");
const resultadoDiv = document.getElementById("resultado");

function mezclar(lista) {
  for (let i = lista.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [lista[i], lista[j]] = [lista[j], lista[i]];
  }
  return lista;
}

document.getElementById("conectar").onclick = () => {
  turnoActual = document.getElementById("turno").value.trim();
  if (!turnoActual) return alert("Ingresá nombre del turno");

  const turnoRef = ref(db, "turnos/" + turnoActual + "/jugadores");

  onValue(turnoRef, snapshot => {
    const data = snapshot.val() || {};
    listaDiv.innerHTML = "<div class='section-title'>👥 Inscriptos</div>";
    Object.values(data).forEach(j => {
      listaDiv.innerHTML += `<div class="item">${j.nombre} - ${j.tipo}</div>`;
    });
  });
};

document.getElementById("anotarse").onclick = () => {
  if (!turnoActual) return alert("Primero conectate a un turno");

  const nombre = document.getElementById("nombre").value.trim();
  const tipo = document.getElementById("tipo").value;

  if (!nombre) return alert("Ingresá tu nombre");

  push(ref(db, "turnos/" + turnoActual + "/jugadores"), {
    nombre,
    tipo
  });

  document.getElementById("nombre").value = "";
};

document.getElementById("sortear").onclick = () => {
  const codigo = prompt("Código admin:");
  if (codigo !== "1234") return alert("Código incorrecto");

  const canchas = parseInt(document.getElementById("canchas").value);
  if (!canchas || canchas < 1) return alert("Ingresá canchas válidas");

  const turnoRef = ref(db, "turnos/" + turnoActual + "/jugadores");

  onValue(turnoRef, snapshot => {
    const jugadores = Object.values(snapshot.val() || {});
    const drives = mezclar(jugadores.filter(j => j.tipo === "Drive"));
    const reves = mezclar(jugadores.filter(j => j.tipo === "Revés"));

    if (drives.length !== reves.length) {
      alert("Cantidad de Drive y Revés debe ser igual");
      return;
    }

    let parejas = [];
    for (let i = 0; i < drives.length; i++) {
      parejas.push(drives[i].nombre + " + " + reves[i].nombre);
    }

    const partidos = Math.min(Math.floor(parejas.length / 2), canchas);
    resultadoDiv.innerHTML = "<div class='section-title'>🏆 Partidos</div>";

    for (let i = 0; i < partidos; i++) {
      resultadoDiv.innerHTML += 
        `<div class="item">Cancha ${i+1}: ${parejas[i*2]} vs ${parejas[i*2+1]}</div>`;
    }

    if (parejas.length > partidos * 2) {
      resultadoDiv.innerHTML += "<div class='section-title'>⏳ Espera</div>";
      for (let i = partidos * 2; i < parejas.length; i++) {
        resultadoDiv.innerHTML += `<div class="item waiting">${parejas[i]}</div>`;
      }
    }

  }, { onlyOnce: true });
};

document.getElementById("limpiar").onclick = () => {
  const codigo = prompt("Código admin:");
  if (codigo !== "1234") return alert("Código incorrecto");

  remove(ref(db, "turnos/" + turnoActual));
  resultadoDiv.innerHTML = "";
};

</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/padel-random-pro/sw.js');
}
</script>

</body>
</html>
